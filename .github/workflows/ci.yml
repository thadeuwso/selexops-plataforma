name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript (web, api, packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # versão do pnpm vem do packageManager no package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Validar schema Prisma
        run: pnpm --filter @selx/database db:validate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

  rls:
    name: RLS — isolamento multi-tenant (gate ADR-0002)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: selx
          POSTGRES_PASSWORD: selx_dev
          POSTGRES_DB: selx
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U selx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql://selx:selx_dev@localhost:5433/selx"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Aplicar migrations
        run: pnpm --filter @selx/database db:deploy

      - name: Provar isolamento entre tenants
        run: pnpm --filter @selx/database test:rls

  python:
    name: Python (ai-service, workers)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ai-service, workers]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Sync
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Testes
        run: uv run pytest -q || [ $? -eq 5 ] # exit 5 = nenhum teste ainda; permitido só no bootstrap
