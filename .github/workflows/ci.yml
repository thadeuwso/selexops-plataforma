name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript (web, api, packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Validar schema Prisma
        run: pnpm --filter @selx/database db:validate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

  python:
    name: Python (ai-service, workers)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ai-service, workers]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Sync
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Testes
        run: uv run pytest -q || [ $? -eq 5 ] # exit 5 = nenhum teste ainda; permitido só no bootstrap
