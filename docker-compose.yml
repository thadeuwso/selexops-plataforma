name: selx

services:
  postgres:
    image: postgres:16-alpine
    container_name: selx-postgres
    environment:
      POSTGRES_USER: selx
      POSTGRES_PASSWORD: selx_dev # somente desenvolvimento local
      POSTGRES_DB: selx
    ports:
      - "5433:5432" # 5433 no host: a máquina de dev pode ter um PostgreSQL nativo na 5432
    volumes:
      - selx-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: selx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # E-mail de desenvolvimento: captura tudo, entrega nada
  mailpit:
    image: axllent/mailpit:latest
    container_name: selx-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI web

volumes:
  selx-pgdata:
